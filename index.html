<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon — ngewqr.com</title>
<meta name="description" content="Built slow. Built right. A personal index of the things worth your time — and your money.">
<meta name="theme-color" content="#f2efe9">
<meta name="robots" content="noindex">

<meta property="og:type" content="website">
<meta property="og:url" content="https://ngewqr.com/">
<meta property="og:title" content="Coming Soon">
<meta property="og:description" content="Built slow. Built right. A personal index of the things worth your time — and your money.">

<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="preload" as="font" href="fonts/inter-var-latin.woff2" type="font/woff2" crossorigin>

<style>
/* Two-column editorial split — image left, words right; stacks image-over-words on mobile.
   Warm gallery palette: ecru paper, espresso ink. Serif headline, sans body.
   Scale: golden ratio φ from 16px · spacing: Fibonacci */
:root {
  --bg: #f2efe9;        /* ecru paper */
  --media: #15100b;     /* espresso, behind the image */
  --ink: #1c1a17;
  --body: #4a453f;
  --muted: #6b6560;
  --hairline: rgba(28, 26, 23, 0.20);
  --fs-xs: 0.786rem;
  --fs-base: 1rem;
  --fs-md: 1.272rem;
  --fs-xl: 2.618rem;
  --serif: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

@font-face {
  font-family: "Inter";
  font-style: normal;
  font-weight: 100 900;
  font-display: swap;
  src: url("fonts/inter-var-latin.woff2") format("woff2");
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--body);
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: var(--fs-base);
  line-height: 1.618;
  -webkit-font-smoothing: antialiased;
}

.split {
  display: grid;
  grid-template-columns: 1.15fr 1fr;
  min-height: 100vh;
  min-height: 100svh;
}

/* ---- Left: hero image ---- */
.hero-media {
  position: relative;
  overflow: hidden;
  background: var(--media);
}

.hero-media img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

@media (prefers-reduced-motion: no-preference) {
  .hero-media img {
    animation: sink 1.6s var(--ease) both;
  }
}

@keyframes sink {
  from { transform: scale(1.05); }
  to   { transform: none; }
}

/* ---- Right: words ---- */
.hero-copy {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: clamp(40px, 6vw, 96px);
}

.copy-inner { max-width: 32em; }

.eyebrow {
  font-size: var(--fs-base);
  font-weight: 500;
  color: var(--ink);
}

h1 {
  margin-top: 21px;
  font-family: var(--serif);
  font-size: clamp(2.1rem, 4.6vw, 3.3rem);
  font-weight: 400;
  letter-spacing: 0.005em;
  line-height: 1.12;
  color: var(--ink);
}

.sub {
  margin-top: 34px;
  max-width: 30em;
  font-size: var(--fs-md);
  color: var(--body);
}

/* ---- Signup ---- */
form {
  margin-top: 55px;
  display: flex;
  align-items: flex-end;
  gap: 21px;
  max-width: 440px;
}

.field { flex: 1; min-width: 0; }

label {
  display: block;
  font-size: var(--fs-xs);
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}

input[type="email"] {
  width: 100%;
  margin-top: 8px;
  padding: 8px 0 13px;
  background: none;
  border: none;
  border-bottom: 1px solid var(--hairline);
  border-radius: 0;
  font: inherit;
  font-size: var(--fs-md);
  color: var(--ink);
  transition: border-color 0.4s var(--ease);
}

input[type="email"]::placeholder { color: rgba(107, 101, 96, 0.55); }

input[type="email"]:focus { outline: none; border-bottom-color: var(--ink); }

button {
  flex: none;
  padding: 8px 0 13px;
  background: none;
  border: none;
  border-bottom: 1px solid var(--ink);
  border-radius: 0;
  font: inherit;
  color: var(--ink);
  cursor: pointer;
  transition: opacity 0.4s var(--ease);
}

button:hover { opacity: 0.6; }

button .arrow {
  display: inline-block;
  margin-left: 8px;
  transition: transform 0.4s var(--ease);
}

button:hover .arrow { transform: translateX(4px); }

.hint {
  margin-top: 21px;
  font-size: var(--fs-xs);
  color: var(--muted);
  min-height: 1.6em;
}

.copy-foot {
  position: absolute;
  left: clamp(40px, 6vw, 96px);
  bottom: clamp(28px, 4vw, 40px);
  font-size: var(--fs-xs);
  color: var(--muted);
}

.nojs-fallback { margin-top: 34px; }
.nojs-fallback a { color: var(--ink); }

/* ---- Stack on smaller screens ---- */
@media (max-width: 820px) {
  .split {
    grid-template-columns: 1fr;
    min-height: 0;
  }
  .hero-media {
    aspect-ratio: 4 / 3;
  }
  .hero-copy {
    justify-content: flex-start;
    padding: 55px 24px 34px;
    min-height: auto;
  }
  form { margin-top: 40px; }
  .copy-foot {
    position: static;
    margin-top: 55px;
  }
}

/* ---- Copy load-in ---- */
@media (prefers-reduced-motion: no-preference) {
  .copy-inner > *, .copy-foot {
    animation: rise 1s var(--ease) both;
  }
  .copy-inner > *:nth-child(1) { animation-delay: 0.15s; }
  .copy-inner > *:nth-child(2) { animation-delay: 0.27s; }
  .copy-inner > *:nth-child(3) { animation-delay: 0.39s; }
  .copy-inner > *:nth-child(4) { animation-delay: 0.51s; }
  .copy-inner > *:nth-child(5) { animation-delay: 0.63s; }
  .copy-foot { animation-delay: 0.75s; }
}

@keyframes rise {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: none; }
}

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}
</style>
<noscript>
  <style>#notify, #hint { display: none; }</style>
</noscript>
</head>
<body>

<div class="split">

  <!-- Left: hero image. Swap the src for your own photo (e.g. img/hero.jpg).
       Keep .hero-media as the wrapper — it crops and holds the aspect ratio. -->
  <div class="hero-media">
    <img src="img/hero.svg" alt="" width="1000" height="1200">
  </div>

  <!-- Right: words -->
  <div class="hero-copy">
    <div class="copy-inner">
      <p class="eyebrow">Coming soon</p>
      <h1>Built slow.<br>Built right.</h1>
      <p class="sub">A personal index of the things worth your time — and your money. It arrives when it's ready, and not a moment before.</p>

      <form id="notify">
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" name="email" id="email" required
                 placeholder="you@email.com"
                 autocomplete="email" inputmode="email">
        </div>
        <button type="submit">Notify me<span class="arrow" aria-hidden="true">&#8594;</span></button>
      </form>

      <p class="hint" id="hint">One email when it's live. Nothing else.</p>

      <noscript>
        <p class="nojs-fallback">
          <a href="mailto:adspacestudios@gmail.com?subject=Subscribe%20to%20ngewqr.com&body=Please%20add%20me%20to%20the%20ngewqr.com%20launch%20list.">Email to get notified at launch</a>
        </p>
      </noscript>
    </div>

    <p class="copy-foot">&copy; 2026 ngewqr.com</p>
  </div>

</div>

<script>
(function () {
  var form = document.getElementById('notify');
  var hint = document.getElementById('hint');
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var email = document.getElementById('email').value.trim();
    var subject = 'Subscribe to ngewqr.com';
    var body = 'Please add me to the ngewqr.com launch list.\n\nEmail: ' + email + '\n';
    window.location.href = 'mailto:adspacestudios@gmail.com'
      + '?subject=' + encodeURIComponent(subject)
      + '&body=' + encodeURIComponent(body);
    hint.textContent = 'Your mail app should open now — press send and you’re on the list.';
  });
})();
</script>

</body>
</html>

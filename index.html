<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:type" content="website">
<meta property="og:url" content="https://ngewqr.com/">

<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="preload" as="font" href="fonts/inter-var-latin.woff2" type="font/woff2" crossorigin>

<style>
/* Warm gallery palette: ecru paper, espresso ink. No colour, no ornament —
   serif editorial type and hairlines carry everything.
   Scale: golden ratio φ from 16px · spacing: Fibonacci */
:root {
  --bg: #f2efe9;        /* ecru paper */
  --ink: #1c1a17;       /* espresso */
  --body: #4a453f;
  --muted: #6b6560;
  --hairline: rgba(28, 26, 23, 0.18);
  --fs-xs: 0.786rem;
  --fs-base: 1rem;
  --fs-md: 1.272rem;
  --fs-xl: 2.618rem;
  --fs-xxl: 4.236rem;
  --serif: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

@font-face {
  font-family: "Inter";
  font-style: normal;
  font-weight: 100 900;
  font-display: swap;
  src: url("fonts/inter-var-latin.woff2") format("woff2");
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  color: var(--body);
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: var(--fs-base);
  line-height: 1.618;
  -webkit-font-smoothing: antialiased;
}

main {
  width: min(100% - 48px, 1200px);
  margin: auto auto 0;
  padding-top: 89px;
}

h1 {
  max-width: 12em;
  font-family: var(--serif);
  font-size: clamp(var(--fs-xl), 7vw, var(--fs-xxl));
  font-weight: 400;
  letter-spacing: 0.005em;
  line-height: 1.18;
  color: var(--ink);
}

h1 .since {
  font-style: italic;
  color: var(--muted);
}

.sub {
  margin-top: 34px;
  max-width: 30em;
  font-family: var(--serif);
  font-size: var(--fs-md);
  color: var(--muted);
}

form {
  margin-top: 89px;
  display: flex;
  align-items: flex-end;
  gap: 21px;
  max-width: 480px;
}

.field {
  flex: 1;
  min-width: 0;
}

label {
  display: block;
  font-size: var(--fs-xs);
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}

input[type="email"] {
  width: 100%;
  margin-top: 8px;
  padding: 8px 0 13px;
  background: none;
  border: none;
  border-bottom: 1px solid var(--hairline);
  border-radius: 0;
  font: inherit;
  font-size: var(--fs-md);
  color: var(--ink);
  transition: border-color 0.4s var(--ease);
}

input[type="email"]::placeholder { color: rgba(107, 101, 96, 0.55); }

input[type="email"]:focus {
  outline: none;
  border-bottom-color: var(--ink);
}

button {
  flex: none;
  padding: 8px 0 13px;
  background: none;
  border: none;
  border-bottom: 1px solid var(--ink);
  border-radius: 0;
  font: inherit;
  font-size: var(--fs-base);
  color: var(--ink);
  cursor: pointer;
  transition: opacity 0.4s var(--ease);
}

button:hover { opacity: 0.6; }

button .arrow {
  display: inline-block;
  margin-left: 8px;
  transition: transform 0.4s var(--ease);
}

button:hover .arrow { transform: translateX(4px); }

.hint {
  margin-top: 21px;
  font-size: var(--fs-xs);
  color: var(--muted);
  min-height: 1.6em;
}

footer {
  width: min(100% - 48px, 1200px);
  margin: 89px auto 0;
  padding: 21px 0 34px;
  border-top: 1px solid var(--hairline);
  font-size: var(--fs-xs);
  color: var(--muted);
}

.nojs-fallback {
  width: min(100% - 48px, 1200px);
  margin: 0 auto;
  padding-bottom: 34px;
}

.nojs-fallback a { color: var(--ink); }

@media (max-width: 639px) {
  main { padding-top: 55px; }
  form {
    margin-top: 55px;
    flex-direction: column;
    align-items: stretch;
    gap: 34px;
  }
  button { align-self: flex-start; }
  footer { margin-top: 55px; }
}

@media (prefers-reduced-motion: no-preference) {
  main > * { animation: rise 1.1s var(--ease) both; }
  main > *:nth-child(2) { animation-delay: 0.12s; }
  main > *:nth-child(3) { animation-delay: 0.24s; }
  main > *:nth-child(4) { animation-delay: 0.36s; }
}

@keyframes rise {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: none; }
}

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}
</style>
<noscript>
  <style>#notify, #hint { display: none; }</style>
</noscript>
</head>
<body>

<main>
  <h1>Coming Soon</h1>

  <p class="sub">Built slow. Built right. Here when it’s ready.</p>

  <form id="notify">
    <div class="field">
      <label for="email">Email address</label>
      <input type="email" name="email" id="email" required
             placeholder="you@email.com"
             autocomplete="email" inputmode="email">
    </div>
    <button type="submit">Notify me<span class="arrow" aria-hidden="true">&#8594;</span></button>
  </form>

  <p class="hint" id="hint">One email when it's live. Nothing else.</p>
</main>

<footer>
  <p>&copy; 2026 ngewqr.com</p>
</footer>

<script>
(function () {
  var form = document.getElementById('notify');
  var hint = document.getElementById('hint');
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var email = document.getElementById('email').value.trim();
    var subject = 'Subscribe to ngewqr.com';
    var body = 'Please add me to the ngewqr.com launch list.\n\nEmail: ' + email + '\n';
    window.location.href = 'mailto:q@ngewqr.com'
      + '?subject=' + encodeURIComponent(subject)
      + '&body=' + encodeURIComponent(body);
    hint.textContent = 'Your mail app should open now — press send and you’re on the list.';
  });
})();
</script>
<noscript>
  <p class="nojs-fallback">
    <a href="mailto:q@ngewqr.com?subject=Subscribe%20to%20ngewqr.com&body=Please%20add%20me%20to%20the%20ngewqr.com%20launch%20list.">Email to get notified at launch</a>
  </p>
</noscript>

</body>
</html>
